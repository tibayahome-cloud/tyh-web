# docker-compose.prod.yml  (pure production, no volumes, no dev dependencies)
services:
    app:
        image: node:22-alpine
        command: sleep infinity
        ports:
            - '3000:3000' # CRA
            - '5173:5173' # Vite
        environment:
            - NODE_ENV=development
        volumes:
            - .:/workspace:cached # your code, cached for speed
